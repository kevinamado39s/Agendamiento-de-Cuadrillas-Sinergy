<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agendamiento de Cuadrillas – Sinergy</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<style>
  :root {
    --azul: #1F4E78; --azul-medio: #2E75B6; --azul-claro: #D9EAF7;
    --verde-claro: #E2F0D9; --naranja-claro: #FCE4D6; --borde: #CCCCCC; --texto: #1a1a1a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
  body { background: #ECECEC; color: var(--texto); }
  header { background: var(--azul); color: white; padding: 16px 24px; }
  header h1 { font-size: 1.2rem; }
  header span { font-size: .85rem; opacity: .8; }
  .tabs { display: flex; background: var(--azul-medio); flex-wrap: wrap; }
  .tab { padding: 10px 22px; color: rgba(255,255,255,.75); cursor: pointer; font-size: .9rem; border-bottom: 3px solid transparent; transition: .2s; }
  .tab.active, .tab:hover { color: white; border-bottom-color: white; }
  .page { display: none; padding: 20px; max-width: 1300px; margin: auto; }
  .page.active { display: block; }
  .card { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .card h2 { font-size: 1rem; color: var(--azul); margin-bottom: 14px; border-bottom: 2px solid var(--azul-claro); padding-bottom: 8px; }
  .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
  label { font-size: .8rem; font-weight: 600; color: #444; display: block; margin-bottom: 4px; }
  input, select, textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--borde); border-radius: 5px; font-size: .88rem; color: var(--texto); background: white; }
  input:focus, select:focus { outline: none; border-color: var(--azul-medio); box-shadow: 0 0 0 2px rgba(46,117,182,.15); }
  .form-full { grid-column: 1 / -1; }
  .hidden { display: none !important; }
  .btn { padding: 9px 18px; border: none; border-radius: 5px; cursor: pointer; font-size: .88rem; font-weight: 600; transition: .2s; }
  .btn-primary { background: var(--azul); color: white; }
  .btn-primary:hover { background: #163759; }
  .btn-secondary { background: #666; color: white; }
  .btn-secondary:hover { background: #444; }
  .btn-danger { background: #C00000; color: white; }
  .btn-danger:hover { background: #900000; }
  .btn-export { background: #375623; color: white; }
  .btn-export:hover { background: #243B17; }
  .btn-print { background: #7030A0; color: white; }
  .btn-print:hover { background: #50207A; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; align-items: center; }
  table { width: 100%; border-collapse: collapse; font-size: .83rem; }
  th { background: var(--azul); color: white; padding: 9px 10px; text-align: left; white-space: nowrap; }
  td { padding: 8px 10px; border-bottom: 1px solid #EFEFEF; vertical-align: middle; }
  tr:hover td { background: #F0F8FF; }
  .badge { padding: 3px 8px; border-radius: 12px; font-size: .75rem; font-weight: 600; white-space: nowrap; display: inline-block; }
  .badge-tp { background: var(--verde-claro); color: #375623; }
  .badge-tr { background: var(--azul-claro); color: var(--azul); }
  .badge-tg { background: var(--naranja-claro); color: #7F3B0E; }
  .badge-nodo { background: #E8D5F5; color: #5B0FA0; }
  .badge-tramo { background: #D5EAF5; color: #0F4A7A; }
  .st-pendiente { background: #FFF2CC; color: #7F6000; }
  .st-curso { background: #D9EAF7; color: #1F4E78; }
  .st-ejecutado { background: #E2F0D9; color: #375623; }
  .st-cancelado { background: #F4CCCC; color: #990000; }
  .filter-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 14px; }
  .filter-row .f { display: flex; flex-direction: column; min-width: 150px; }
  .empty { color: #999; text-align: center; padding: 30px; font-size: .9rem; }
  .duracion { font-weight: 600; color: var(--azul); }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat { background: white; border-radius: 8px; padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.08); text-align: center; }
  .stat .num { font-size: 1.6rem; font-weight: 700; color: var(--azul); }
  .stat .lbl { font-size: .78rem; color: #666; margin-top: 4px; }
  .week-block { margin-bottom: 18px; border: 1px solid #e9e9e9; border-radius: 8px; overflow: hidden; }
  .week-title { background: #f8fbfe; padding: 12px 14px; border-bottom: 1px solid #e9eef4; font-weight: 700; color: var(--azul); }
  .inline-select { min-width: 120px; padding: 5px 7px; font-size: .8rem; border: 1px solid var(--borde); border-radius: 4px; }
  .small-btn { padding: 5px 8px; font-size: .75rem; }
  .hint { font-size: .75rem; color: #888; margin-top: 3px; font-style: italic; }
  @media print {
    header, .tabs, .btn-row, .filter-row, .no-print { display: none !important; }
    .page { display: block !important; padding: 0; }
    .card { box-shadow: none; border: 1px solid #ddd; }
    body { background: white; }
  }
</style>
</head>
<body>

<header>
  <h1>📡 Agendamiento de Cuadrillas</h1>
  <span>Sinergy Soluciones Integrales S.A.S. — Dirección de Infraestructura</span>
</header>

<div class="tabs">
  <div class="tab active" onclick="showPage('agenda',this)">📋 Nuevo Registro</div>
  <div class="tab" onclick="showPage('listado',this)">📅 Listado / Filtros</div>
  <div class="tab" onclick="showPage('exportar',this)">📤 Exportar</div>
  <div class="tab" onclick="showPage('resumen',this)">📊 Resumen</div>
</div>

<div id="page-agenda" class="page active">
  <div class="card">
    <h2 id="form-title">Registrar actividad</h2>
    <input type="hidden" id="f-id">
    <input type="hidden" id="f-estado-hidden">
    <input type="hidden" id="f-manual-hidden" value="false">

    <div class="form-grid">
      <div>
        <label>Cuadrilla *</label>
        <input id="f-cuadrilla" list="dl-cuadrillas" placeholder="Escribe o selecciona"
               oninput="onCuadrillaChange()" onchange="onCuadrillaChange()">
        <datalist id="dl-cuadrillas"></datalist>
      </div>
      <div>
        <label>Fecha *</label>
        <input type="date" id="f-fecha" onchange="calcularSemana()">
        <div class="hint" id="hint-fecha"></div>
      </div>
      <div>
        <label>Semana</label>
        <input type="text" id="f-semana" readonly style="background:#f0f0f0;cursor:not-allowed;">
      </div>
      <div>
        <label>Actividad *</label>
        <input id="f-actividad" list="dl-actividades" placeholder="Escribe o selecciona"
               oninput="toggleUbicacion()" onchange="toggleUbicacion()">
        <datalist id="dl-actividades"></datalist>
      </div>
      <div id="box-tipo" class="hidden">
        <label>Tipo *</label>
        <select id="f-tipo" onchange="toggleTipo()">
          <option value="">-- seleccionar --</option>
          <option>Nodo</option>
          <option>Tramo</option>
        </select>
      </div>
      <div id="box-municipio" class="hidden">
        <label id="lbl-municipio1">Municipio *</label>
        <input id="f-municipio" list="dl-municipios" placeholder="Escribe o selecciona">
      </div>
      <div id="box-municipio2" class="hidden">
        <label>Municipio 2 *</label>
        <input id="f-municipio2" list="dl-municipios" placeholder="Escribe o selecciona">
      </div>
      <div id="box-origen" class="hidden">
        <label>Origen *</label>
        <input id="f-origen" list="dl-municipios" placeholder="Escribe o selecciona">
      </div>
      <div id="box-destino" class="hidden">
        <label>Destino *</label>
        <input id="f-destino" list="dl-municipios" placeholder="Escribe o selecciona">
      </div>
      <div>
        <label>Hora inicio</label>
        <select id="f-hinicio"></select>
      </div>
      <div>
        <label>Hora fin</label>
        <select id="f-hfin"></select>
      </div>
      <div>
        <label>Responsable</label>
        <input id="f-responsable" list="dl-responsables" placeholder="Escribe o selecciona">
        <datalist id="dl-responsables"></datalist>
      </div>
      <div>
        <label>Vehículo</label>
        <input id="f-vehiculo" list="dl-vehiculos" placeholder="Escribe o selecciona">
        <datalist id="dl-vehiculos"></datalist>
      </div>
      <div>
        <label>Financiación</label>
        <select id="f-financiacion">
          <option>No aplica</option>
          <option>Viáticos</option>
          <option>Rubro de emergencia</option>
        </select>
      </div>
      <div class="form-full">
        <label>Observaciones</label>
        <input type="text" id="f-obs" placeholder="Opcional">
      </div>
    </div>

    <datalist id="dl-municipios"></datalist>

    <div class="btn-row">
      <button class="btn btn-primary" id="btn-save" onclick="guardar()">💾 Guardar actividad</button>
      <button class="btn btn-secondary hidden" id="btn-cancel-edit" onclick="cancelarEdicion()">↩ Cancelar edición</button>
      <span id="msg-ok" style="color:green;font-size:.85rem;display:none">✔ Guardado correctamente</span>
    </div>
  </div>
</div>

<div id="page-listado" class="page">
  <div class="card">
    <h2>Filtrar actividades</h2>
    <div class="filter-row">
      <div class="f"><label>Semana</label>
        <select id="fil-semana" onchange="renderTabla()">
          <option value="">Todas</option>
          <option>A</option><option>B</option><option>C</option><option>D</option><option>E</option>
        </select>
      </div>
      <div class="f"><label>Cuadrilla</label>
        <input id="fil-cuadrilla" list="dl-cuadrillas" placeholder="Todas" oninput="renderTabla()">
      </div>
      <div class="f"><label>Estado</label>
        <select id="fil-estado" onchange="renderTabla()">
          <option value="">Todos</option>
          <option>Pendiente</option><option>En curso</option>
          <option>Ejecutado</option><option>Cancelado</option>
        </select>
      </div>
      <div class="f"><label>Fecha desde</label>
        <input type="date" id="fil-desde" onchange="renderTabla()">
      </div>
      <div class="f"><label>Fecha hasta</label>
        <input type="date" id="fil-hasta" onchange="renderTabla()">
      </div>
      <button class="btn btn-primary" onclick="limpiarFiltros()">🔄 Limpiar</button>
    </div>
    <div id="tabla-container"></div>
  </div>
</div>

<div id="page-exportar" class="page">
  <div class="card">
    <h2>Exportar agenda</h2>
    <div class="filter-row">
      <div class="f"><label>Cuadrilla</label>
        <input id="exp-cuadrilla" list="dl-cuadrillas" placeholder="Todas" oninput="renderPreview()">
      </div>
      <div class="f"><label>Semana</label>
        <select id="exp-semana" onchange="renderPreview()">
          <option value="">Todas</option>
          <option>A</option><option>B</option><option>C</option><option>D</option><option>E</option>
        </select>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-export" onclick="exportarCSV()">📥 Descargar CSV</button>
      <button class="btn btn-print" onclick="exportarPDF()">📄 Descargar PDF</button>
    </div>
  </div>
  <div class="card"><h2>Vista previa</h2><div id="preview-tabla"></div></div>
</div>

<div id="page-resumen" class="page">
  <div id="resumen-content"></div>
</div>

<script>
const KEY = 'sinergy_agenda_v3';

/* ── ACTIVIDADES ACTUALIZADAS ── */
const ACTIVIDADES_BASE = [
  'Desplazamiento',
  'Tendido',
  'Entrega servicio',
  'Incidencia Masiva',
  'Mantenimiento Programado',
  'Revisión/Inspección',
  'Apoyo Operaciones',
  'Almuerzo',
  'Viabilidad',
  'Entrega Postventa',
  'Ticket Corporativo',
  'Levantamiento de Carteras',
  'Podas',
  'Ampliación de Red'
];

const CFG = {
  cuadrillas: ['Tendido Pitalito','Troncal','Tendido Garzón'],
  actividades: {
    'Tendido Pitalito': [...ACTIVIDADES_BASE],
    'Troncal':          [...ACTIVIDADES_BASE],
    'Tendido Garzón':   [...ACTIVIDADES_BASE]
  },
  municipios: [
    'Isnos','San Agustin','Bruselas','Pitalito','Acevedo','Suaza','Guadalupe',
    'Altamira','Garzon','Gigante','Hobo','Campoalegre','Neiva','Palermo',
    'Teruel','Iquira','Tesalia','Paicol','La Plata','Pital','Timaná','Tarqui','Elias'
  ],
  responsables: [
    'Wilson Gonzalez','Jeysson Muñoz','Yoelver Laguna','Rovin Chica',
    'Diego Arcos','Nelson Trujillo','Donaldo Cuadro','Heiner Avila'
  ],
  vehiculos: ['MQO 633','CGO 113','NQV 614','NQW 070','DEY 888','RDU 154','Servicio público','No aplica'],
  estados: ['Pendiente','En curso','Ejecutado','Cancelado']
};

/* ── Storage ── */
function getData() { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch(e) { return []; } }
function setData(d) { localStorage.setItem(KEY, JSON.stringify(d)); }

/* ── Generar opciones de hora de 10 en 10 ── */
function generarOpcionesHora(idSelect, valorSeleccionado = '') {
  const el = document.getElementById(idSelect);
  if (!el) return;
  let html = '<option value="">-- hora --</option>';
  for (let h = 0; h < 24; h++) {
    for (let m = 0; m < 60; m += 10) {
      const v = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
      html += `<option value="${v}"${v === valorSeleccionado ? ' selected' : ''}>${v}</option>`;
    }
  }
  el.innerHTML = html;
}

/* ── Calcular semana por semana calendario real (Lun–Dom) ── */
function calcularSemana() {
  const fecha = val('f-fecha');
  if (!fecha) return;
  const d = new Date(fecha + 'T12:00:00');
  const dow = d.getDay();
  const offsetLunes = dow === 0 ? -6 : 1 - dow;
  const lunesSemana = new Date(d);
  lunesSemana.setDate(d.getDate() + offsetLunes);
  const primerDia = new Date(d.getFullYear(), d.getMonth(), 1);
  const dowPrimer = primerDia.getDay();
  const offsetPrimerLunes = dowPrimer === 0 ? 1 : dowPrimer === 1 ? 0 : 8 - dowPrimer;
  const primerLunes = new Date(d.getFullYear(), d.getMonth(), 1 + offsetPrimerLunes);
  let diffSemanas = Math.round((lunesSemana - primerLunes) / (7 * 24 * 60 * 60 * 1000));
  if (diffSemanas < 0) diffSemanas = 0;
  const semana = ['A','B','C','D','E'][Math.min(diffSemanas, 4)];
  setVal('f-semana', semana);
  sugerirHoraInicio();
  actualizarHintFecha(val('f-fecha'), val('f-cuadrilla'));
}

/* ── Sugerir fecha ── */
function sugerirFecha(cuadrilla = '') {
  const data = getData();
  const filtrados = cuadrilla
    ? data.filter(r => r.cuadrilla === cuadrilla && r.fecha)
    : data.filter(r => r.fecha);
  if (!filtrados.length) return new Date().toISOString().split('T')[0];
  const sorted = [...filtrados].sort((a,b) =>
    (b.fecha + (b.hfin||'')).localeCompare(a.fecha + (a.hfin||''))
  );
  return sorted[0].fecha;
}

function actualizarHintFecha(fecha, cuadrilla) {
  const hint = document.getElementById('hint-fecha');
  if (!hint) return;
  if (!fecha || !cuadrilla) { hint.textContent = ''; return; }
  const rows = getData()
    .filter(r => r.fecha === fecha && r.cuadrilla === cuadrilla && r.hfin)
    .sort((a,b) => a.hfin.localeCompare(b.hfin));
  hint.textContent = rows.length
    ? `↑ Último registro: ${rows[rows.length-1].hfin}`
    : 'Sin actividades en esta fecha para la cuadrilla';
}

/* ── Estado automático ── */
function autoEstado(row) {
  const now   = new Date();
  const today = now.toISOString().split('T')[0];
  const hhmm  = now.toTimeString().slice(0, 5);
  if (!row.fecha)                         return 'Pendiente';
  if (row.fecha > today)                  return 'Pendiente';
  if (row.fecha < today)                  return 'Ejecutado';
  if (row.hfin    && hhmm >= row.hfin)    return 'Ejecutado';
  if (row.hinicio && hhmm >= row.hinicio) return 'En curso';
  return 'Pendiente';
}

function estadoEfectivo(row) {
  if (row.estado === 'Cancelado') return 'Cancelado';
  if (row.manualEstado)           return row.estado;
  return autoEstado(row);
}

/* ── Helpers visuales ── */
function badgeClass(c) {
  if (c === 'Tendido Pitalito') return 'badge-tp';
  if (c === 'Troncal')         return 'badge-tr';
  return 'badge-tg';
}
function estadoClass(e) {
  if (e === 'Pendiente') return 'st-pendiente';
  if (e === 'En curso')  return 'st-curso';
  if (e === 'Ejecutado') return 'st-ejecutado';
  return 'st-cancelado';
}
function esc(s = '') {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function getDia(f) {
  if (!f) return '';
  return ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'][new Date(f + 'T12:00:00').getDay()];
}
function calcDur(hi, hf) {
  if (!hi || !hf) return '';
  const a = toMin(hi), b = toMin(hf);
  if (b <= a) return '';
  const mins = b - a, h = Math.floor(mins/60), m = mins % 60;
  return h > 0 ? (m > 0 ? `${h}h ${m}min` : `${h}h`) : `${m}min`;
}
function toMin(hhmm) { const [h,m] = hhmm.split(':').map(Number); return h*60+m; }
function val(id)          { return document.getElementById(id).value.trim(); }
function setVal(id, v='') { document.getElementById(id).value = v ?? ''; }

/* ── Datalists ── */
function fillDL(id, items) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = [...new Set(items.filter(Boolean))]
    .sort((a,b) => a.localeCompare(b,'es'))
    .map(v => `<option value="${esc(v)}"></option>`).join('');
}

function initLists() {
  fillDL('dl-cuadrillas', CFG.cuadrillas);
  const data = getData();
  fillDL('dl-municipios', [
    ...CFG.municipios,
    ...data.flatMap(r => [r.municipio, r.municipio2, r.origen, r.destino]).filter(Boolean)
  ]);
  fillDL('dl-responsables', [...CFG.responsables, ...data.map(r=>r.responsable).filter(Boolean)]);
  fillDL('dl-vehiculos',    [...CFG.vehiculos,    ...data.map(r=>r.vehiculo).filter(Boolean)]);
  generarOpcionesHora('f-hinicio');
  generarOpcionesHora('f-hfin');
  onCuadrillaChange();
}

function onCuadrillaChange() {
  const c = val('f-cuadrilla');
  const base = (c && CFG.actividades[c]) ? CFG.actividades[c] : ACTIVIDADES_BASE;
  const hist = getData().filter(r => !c || r.cuadrilla === c).map(r => r.actividad).filter(Boolean);
  fillDL('dl-actividades', [...new Set([...base, ...hist])]);
  if (!val('f-id')) {
    setVal('f-fecha', sugerirFecha(c));
    calcularSemana();
  }
  sugerirHoraInicio();
  actualizarHintFecha(val('f-fecha'), c);
}

/* ── Ubicación ── */
function toggleUbicacion() {
  const esDesp = val('f-actividad').toLowerCase() === 'desplazamiento';
  document.getElementById('box-origen').classList.toggle('hidden', !esDesp);
  document.getElementById('box-destino').classList.toggle('hidden', !esDesp);
  document.getElementById('box-tipo').classList.toggle('hidden', esDesp);
  if (esDesp) {
    document.getElementById('box-municipio').classList.add('hidden');
    document.getElementById('box-municipio2').classList.add('hidden');
    setVal('f-tipo'); setVal('f-municipio'); setVal('f-municipio2');
  } else {
    setVal('f-origen'); setVal('f-destino');
    toggleTipo();
  }
}

function toggleTipo() {
  const tipo = val('f-tipo');
  document.getElementById('box-municipio').classList.toggle('hidden', !tipo);
  document.getElementById('box-municipio2').classList.toggle('hidden', tipo !== 'Tramo');
  document.getElementById('lbl-municipio1').textContent = tipo === 'Tramo' ? 'Municipio 1 *' : 'Municipio *';
  if (tipo !== 'Tramo') setVal('f-municipio2');
  if (!tipo) setVal('f-municipio');
}

/* ── Sugerencia hora inicio ── */
function sugerirHoraInicio() {
  if (val('f-id')) return;
  const fecha = val('f-fecha'), cuadrilla = val('f-cuadrilla');
  if (!fecha || !cuadrilla) return;
  const rows = getData()
    .filter(r => r.fecha === fecha && r.cuadrilla === cuadrilla && r.hfin)
    .sort((a,b) => a.hfin.localeCompare(b.hfin));
  const sugerida = rows.length ? rows[rows.length-1].hfin : '07:50';
  generarOpcionesHora('f-hinicio', sugerida);
}

/* ── Ubicación texto ── */
function getUbicacion(r) {
  if ((r.actividad||'').toLowerCase() === 'desplazamiento') return `${r.origen||''} → ${r.destino||''}`;
  if (r.tipo === 'Tramo') return `Tramo: ${r.municipio||''} → ${r.municipio2||''}`;
  if (r.tipo === 'Nodo')  return `Nodo: ${r.municipio||''}`;
  return r.municipio || '';
}

/* ── CRUD ── */
function guardar() {
  const id         = val('f-id');
  const fecha      = val('f-fecha');
  const semana     = val('f-semana');
  const cuadrilla  = val('f-cuadrilla');
  const actividad  = val('f-actividad');
  const tipo       = val('f-tipo');
  const municipio  = val('f-municipio');
  const municipio2 = val('f-municipio2');
  const origen     = val('f-origen');
  const destino    = val('f-destino');
  const hinicio    = val('f-hinicio');
  const hfin       = val('f-hfin');

  if (!fecha || !cuadrilla || !actividad) { alert('⚠️ Completa: Fecha, Cuadrilla y Actividad.'); return; }
  const esDesp = actividad.toLowerCase() === 'desplazamiento';
  if (esDesp) {
    if (!origen || !destino) { alert('⚠️ Para desplazamiento indica Origen y Destino.'); return; }
  } else {
    if (!tipo)      { alert('⚠️ Indica si la actividad es en Nodo o Tramo.'); return; }
    if (!municipio) { alert('⚠️ Indica el Municipio.'); return; }
    if (tipo === 'Tramo' && !municipio2) { alert('⚠️ Para Tramo indica el Municipio 2.'); return; }
  }
  if (hinicio && hfin && toMin(hfin) <= toMin(hinicio)) { alert('⚠️ La hora fin debe ser mayor que la hora inicio.'); return; }

  const data  = getData();
  const isNew = !id;
  const row = {
    id:           isNew ? Date.now() : Number(id),
    fecha, dia: getDia(fecha), semana, cuadrilla, actividad,
    tipo:         esDesp ? '' : tipo,
    municipio:    esDesp ? '' : municipio,
    municipio2:   (!esDesp && tipo === 'Tramo') ? municipio2 : '',
    origen:       esDesp ? origen : '',
    destino:      esDesp ? destino : '',
    hinicio, hfin, duracion: calcDur(hinicio, hfin),
    responsable:  val('f-responsable'),
    vehiculo:     val('f-vehiculo'),
    financiacion: val('f-financiacion'),
    obs:          val('f-obs'),
    updatedAt:    new Date().toISOString(),
    estado:       isNew ? autoEstado({fecha,hinicio,hfin}) : (val('f-estado-hidden') || autoEstado({fecha,hinicio,hfin})),
    manualEstado: !isNew && document.getElementById('f-manual-hidden').value === 'true'
  };

  if (isNew) { data.push(row); }
  else {
    const idx = data.findIndex(r => r.id === Number(id));
    if (idx >= 0) data[idx] = row;
  }
  data.sort((a,b) => (a.fecha+(a.hinicio||'')).localeCompare(b.fecha+(b.hinicio||'')));
  setData(data); initLists(); resetForm();
  const ok = document.getElementById('msg-ok');
  ok.style.display = 'inline'; setTimeout(() => ok.style.display = 'none', 2500);
  renderTabla(); renderPreview(); renderResumen();
}

function resetForm() {
  setVal('f-id',''); setVal('f-estado-hidden',''); setVal('f-manual-hidden','false');
  setVal('f-fecha', sugerirFecha());
  calcularSemana();
  setVal('f-cuadrilla',''); setVal('f-actividad','');
  setVal('f-tipo',''); setVal('f-municipio',''); setVal('f-municipio2','');
  setVal('f-origen',''); setVal('f-destino','');
  setVal('f-responsable',''); setVal('f-vehiculo','');
  setVal('f-financiacion','No aplica'); setVal('f-obs','');
  generarOpcionesHora('f-hinicio');
  generarOpcionesHora('f-hfin');
  ['box-tipo','box-municipio','box-municipio2','box-origen','box-destino']
    .forEach(id => document.getElementById(id).classList.add('hidden'));
  document.getElementById('hint-fecha').textContent = '';
  document.getElementById('form-title').textContent = 'Registrar actividad';
  document.getElementById('btn-save').textContent   = '💾 Guardar actividad';
  document.getElementById('btn-cancel-edit').classList.add('hidden');
  onCuadrillaChange();
}

function cancelarEdicion() { resetForm(); }

function editar(id) {
  const row = getData().find(r => r.id === id);
  if (!row) return;
  setVal('f-id', row.id);
  setVal('f-estado-hidden', row.estado || 'Pendiente');
  setVal('f-manual-hidden', String(row.manualEstado || false));
  setVal('f-fecha', row.fecha); calcularSemana();
  setVal('f-cuadrilla', row.cuadrilla); onCuadrillaChange();
  setVal('f-actividad', row.actividad);
  setVal('f-tipo',       row.tipo       || '');
  setVal('f-municipio',  row.municipio  || '');
  setVal('f-municipio2', row.municipio2 || '');
  setVal('f-origen',     row.origen     || '');
  setVal('f-destino',    row.destino    || '');
  toggleUbicacion();
  generarOpcionesHora('f-hinicio', row.hinicio || '');
  generarOpcionesHora('f-hfin',    row.hfin    || '');
  setVal('f-responsable',  row.responsable  || '');
  setVal('f-vehiculo',     row.vehiculo     || '');
  setVal('f-financiacion', row.financiacion || 'No aplica');
  setVal('f-obs',          row.obs          || '');
  document.getElementById('form-title').textContent = '✏️ Editar actividad';
  document.getElementById('btn-save').textContent   = '✏️ Actualizar actividad';
  document.getElementById('btn-cancel-edit').classList.remove('hidden');
  showPage('agenda', document.querySelectorAll('.tab')[0]);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function eliminar(id) {
  if (!confirm('¿Eliminar esta actividad?')) return;
  setData(getData().filter(r => r.id !== id));
  initLists(); renderTabla(); renderPreview(); renderResumen();
}

function actualizarEstado(id, nuevoEstado) {
  const data = getData();
  const idx  = data.findIndex(r => r.id === id);
  if (idx < 0) return;
  data[idx].estado       = nuevoEstado;
  data[idx].manualEstado = true;
  data[idx].updatedAt    = new Date().toISOString();
  setData(data);
  renderTabla(); renderResumen(); renderPreview();
}

/* ── Filtros ── */
function filtrar(data, semana, cuadrilla, desde, hasta, estado = '') {
  return data.filter(r => {
    if (semana    && r.semana    !== semana)       return false;
    if (cuadrilla && r.cuadrilla !== cuadrilla)    return false;
    if (estado    && estadoEfectivo(r) !== estado) return false;
    if (desde     && r.fecha < desde)              return false;
    if (hasta     && r.fecha > hasta)              return false;
    return true;
  });
}

/* ── Tabla ── */
function buildTabla(rows, { acciones = false, estadoEditable = false } = {}) {
  if (!rows.length) return '<div class="empty">Sin actividades para los filtros seleccionados.</div>';
  const cols = ['Fecha','Día','Sem.','Cuadrilla','Actividad','Estado','Tipo','Ubicación',
                'H. inicio','H. fin','Duración','Responsable','Vehículo','Financiación','Obs.'];
  let html = '<div style="overflow-x:auto"><table><thead><tr>';
  cols.forEach(c => html += `<th>${c}</th>`);
  if (acciones) html += '<th>Acciones</th>';
  html += '</tr></thead><tbody>';

  rows.forEach(r => {
    const est    = estadoEfectivo(r);
    const esDesp = (r.actividad||'').toLowerCase() === 'desplazamiento';
    const tipoDisplay = esDesp
      ? '<span class="badge" style="background:#f0f0f0;color:#555">Desp.</span>'
      : r.tipo
        ? `<span class="badge ${r.tipo==='Nodo'?'badge-nodo':'badge-tramo'}">${r.tipo}</span>`
        : '';
    html += `<tr>
      <td>${esc(r.fecha)}</td><td>${esc(r.dia||'')}</td><td>${esc(r.semana||'')}</td>
      <td><span class="badge ${badgeClass(r.cuadrilla)}">${esc(r.cuadrilla)}</span></td>
      <td>${esc(r.actividad||'')}</td>
      <td>${estadoEditable
        ? `<select class="inline-select" onchange="actualizarEstado(${r.id},this.value)">
             ${CFG.estados.map(e=>`<option ${e===est?'selected':''}>${e}</option>`).join('')}
           </select>`
        : `<span class="badge ${estadoClass(est)}">${est}</span>`
      }</td>
      <td>${tipoDisplay}</td>
      <td>${esc(getUbicacion(r))}</td>
      <td>${esc(r.hinicio||'')}</td><td>${esc(r.hfin||'')}</td>
      <td class="duracion">${esc(r.duracion||'')}</td>
      <td>${esc(r.responsable||'')}</td><td>${esc(r.vehiculo||'')}</td>
      <td>${esc(r.financiacion||'')}</td><td>${esc(r.obs||'')}</td>`;
    if (acciones) {
      html += `<td><div style="display:flex;gap:5px;flex-wrap:wrap">
        <button class="btn btn-primary small-btn" onclick="editar(${r.id})">✏️ Editar</button>
        <button class="btn btn-danger small-btn"  onclick="eliminar(${r.id})">✕ Eliminar</button>
      </div></td>`;
    }
    html += '</tr>';
  });
  return html + '</tbody></table></div>';
}

function renderTabla() {
  const rows = filtrar(getData(),
    document.getElementById('fil-semana').value,
    document.getElementById('fil-cuadrilla').value.trim(),
    document.getElementById('fil-desde').value,
    document.getElementById('fil-hasta').value,
    document.getElementById('fil-estado').value
  ).sort((a,b) => (a.fecha+(a.hinicio||'')).localeCompare(b.fecha+(b.hinicio||'')));
  document.getElementById('tabla-container').innerHTML = buildTabla(rows, { acciones:true, estadoEditable:true });
}

function limpiarFiltros() {
  ['fil-semana','fil-estado','fil-desde','fil-hasta'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fil-cuadrilla').value = '';
  renderTabla();
}

function renderPreview() {
  const rows = filtrar(getData(),
    document.getElementById('exp-semana').value,
    document.getElementById('exp-cuadrilla').value.trim(),
    '','',''
  ).sort((a,b) => (a.fecha+(a.hinicio||'')).localeCompare(b.fecha+(b.hinicio||'')));
  document.getElementById('preview-tabla').innerHTML = buildTabla(rows, { acciones:false, estadoEditable:false });
}

/* ── CSV ── */
function csv(v = '') { return `"${String(v ?? '').replaceAll('"','""')}"`; }
function exportarCSV() {
  const semana    = document.getElementById('exp-semana').value;
  const cuadrilla = document.getElementById('exp-cuadrilla').value.trim();
  const rows = filtrar(getData(), semana, cuadrilla, '','');
  if (!rows.length) { alert('Sin datos para exportar.'); return; }
  const heads = ['Fecha','Dia','Semana','Cuadrilla','Actividad','Estado','Tipo',
                 'Municipio','Municipio2','Origen','Destino',
                 'H_inicio','H_fin','Duracion','Responsable','Vehiculo','Financiacion','Observaciones'];
  const lines = [heads.join(',')];
  rows.forEach(r => lines.push([
    csv(r.fecha),csv(r.dia),csv(r.semana),csv(r.cuadrilla),csv(r.actividad),
    csv(estadoEfectivo(r)),csv(r.tipo),csv(r.municipio),csv(r.municipio2),
    csv(r.origen),csv(r.destino),csv(r.hinicio),csv(r.hfin),csv(r.duracion),
    csv(r.responsable),csv(r.vehiculo),csv(r.financiacion),csv(r.obs)
  ].join(',')));
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([lines.join('\n')], { type:'text/csv;charset=utf-8;' }));
  a.download = `agenda_${(cuadrilla||'todas').replace(/ /g,'_')}_sem${semana||'todas'}.csv`;
  a.click();
}

/* ── PDF ── */
function exportarPDF() {
  const semana    = document.getElementById('exp-semana').value;
  const cuadrilla = document.getElementById('exp-cuadrilla').value.trim();
  const rows = filtrar(getData(), semana, cuadrilla, '','');
  if (!rows.length) { alert('Sin datos para exportar.'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'landscape', unit:'mm', format:'a4' });
  const fecha = new Date();
  const titulo = `Agenda${cuadrilla?` — ${cuadrilla}`:''}${semana?` — Semana ${semana}`:''}`;
  doc.setFontSize(16); doc.setTextColor(31,78,120);
  doc.text('Sinergy Soluciones Integrales S.A.S.', 15, 15);
  doc.setFontSize(11); doc.setTextColor(100,100,100);
  doc.text('Dirección de Infraestructura', 15, 22);
  doc.setFontSize(12); doc.setTextColor(31,78,120);
  doc.text(titulo, 15, 30);
  doc.setFontSize(9); doc.setTextColor(150,150,150);
  doc.text(`Generado: ${fecha.toLocaleDateString('es-CO')} ${fecha.toLocaleTimeString('es-CO')}`, 15, 37);
  const tableData = rows.map(r => [
    r.fecha, r.dia||'', r.semana||'', r.cuadrilla, r.actividad||'',
    estadoEfectivo(r), r.tipo||'', getUbicacion(r),
    r.hinicio||'', r.hfin||'', r.duracion||'',
    r.responsable||'', r.vehiculo||'', r.financiacion||'', r.obs||''
  ]);
  doc.autoTable({
    head:[['Fecha','Día','Sem.','Cuadrilla','Actividad','Estado','Tipo','Ubicación',
           'H. inicio','H. fin','Duración','Responsable','Vehículo','Financiación','Obs.']],
    body: tableData, startY: 42, theme:'grid',
    headStyles:{ fillColor:[31,78,120], textColor:[255,255,255], fontStyle:'bold', fontSize:8 },
    bodyStyles:{ fontSize:7.5, textColor:[50,50,50] },
    columnStyles:{
      0:{halign:'center'},1:{halign:'center'},2:{halign:'center'},
      5:{halign:'center'},6:{halign:'center'},8:{halign:'center'},
      9:{halign:'center'},10:{halign:'center'}
    },
    margin:{ left:10, right:10 },
    didDrawPage(data) {
      const ph = doc.internal.pageSize.getHeight();
      doc.setFontSize(7); doc.setTextColor(200,200,200);
      doc.text('Documento generado automáticamente — Sistema de Agendamiento Sinergy', 15, ph - 8);
    }
  });
  doc.save(`agenda_${(cuadrilla||'todas').replace(/ /g,'_')}_sem${semana||'todas'}.pdf`);
}

/* ── Resumen ── */
function renderResumen() {
  const data = getData().sort((a,b) => (a.fecha+(a.hinicio||'')).localeCompare(b.fecha+(b.hinicio||'')));
  const cont = document.getElementById('resumen-content');
  if (!data.length) { cont.innerHTML='<div class="card"><div class="empty">Sin datos registrados aún.</div></div>'; return; }
  const porEstado = e => data.filter(r => estadoEfectivo(r) === e).length;
  let html = `<div class="stat-grid">
    <div class="stat"><div class="num">${data.length}</div><div class="lbl">Total actividades</div></div>
    <div class="stat"><div class="num">${porEstado('Pendiente')}</div><div class="lbl">Pendientes</div></div>
    <div class="stat"><div class="num">${porEstado('En curso')}</div><div class="lbl">En curso</div></div>
    <div class="stat"><div class="num">${porEstado('Ejecutado')}</div><div class="lbl">Ejecutadas</div></div>
    <div class="stat"><div class="num">${porEstado('Cancelado')}</div><div class="lbl">Canceladas</div></div>
  </div>`;
  const semanas = [...new Set(data.map(r => r.semana))].sort();
  semanas.forEach(sem => {
    const rowsSem = data.filter(r => r.semana === sem);
    html += `<div class="card"><h2>📅 Semana ${sem} — ${rowsSem.length} actividades</h2>`;
    CFG.cuadrillas.forEach(c => {
      const rc = rowsSem.filter(r => r.cuadrilla === c);
      if (!rc.length) return;
      html += `<div class="week-block">
        <div class="week-title"><span class="badge ${badgeClass(c)}">${c}</span> · ${rc.length} actividades</div>
        ${buildTabla(rc, { acciones:false, estadoEditable:false })}
      </div>`;
    });
    html += '</div>';
  });
  cont.innerHTML = html;
}

/* ── Navegación ── */
function showPage(name, tabEl) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  if (tabEl?.classList?.contains('tab')) tabEl.classList.add('active');
  if (name === 'listado') renderTabla();
  if (name === 'exportar') renderPreview();
  if (name === 'resumen') renderResumen();
}

/* ── Init ── */
initLists();
resetForm();
renderTabla();
renderResumen();
</script>
</body>
</html>
